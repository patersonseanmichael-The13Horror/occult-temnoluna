<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temnoluna | Moonlit Justice & Occult Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="moon-container">
    <h1>Temnoluna</h1>
    <p class="description">
      Lunar balance. Justice in duality. High Priestess' path.  
      Click the cards for revelations. 🌙🔮
    </p>
    <img 
      src="https://i.imgur.com/XmztLZb.png" 
      alt="Temnoluna's Siamese Cat" 
      class="cat-image" 
    />
    <div class="tarot-grid">
      <div class="card past"> 
        <div class="card-wrapper">
          <div class="front">
            <img src="images/tarot/back-of-card.png" alt="Card back">
          </div>
          <div class="back">
            <img src="" alt="Front of card">
            <p></p>
          </div>
        </div>
      </div>
      <div class="card present"> 
        <div class="card-wrapper">
          <div class="front">
            <img src="images/tarot/back-of-card.png" alt="Card back">
          </div>
          <div class="back">
            <img src="" alt="Front of card">
            <p></p>
          </div>
        </div>
      </div>
      <div class="card future"> 
        <div class="card-wrapper">
          <div class="front">
            <img src="images/tarot/back-of-card.png" alt="Card back">
          </div>
          <div class="back">
            <img src="" alt="Front of card">
            <p></p>
          </div>
        </div>
      </div>
    </div>
    <button id="shuffle-button" class="shuffle-button">Get New Reading</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
</body>
</html>
