<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temnoluna | Moonlit Justice & Occult Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="moon-container">
    <h1>Temnoluna</h1>
    <p>Lunar balance. Justice in duality. High Priestess' path.</p>
    <p>Siamese eyes guide the way between stars and law.</p>
    <img 
      src="https://i.imgur.com/XmztLZb.png" 
      alt="Temnoluna's Siamese Cat" 
      class="cat-image" 
    />
    <div class="tarot-grid">
      <!-- Past -->
      <div class="card past" data-title="The Past">
        <img src="https://i.imgur.com/HighPriestessFront.png" alt="High Priestess">
        <p>Bound by law, yet drawn to shadow.</p>
      </div>
      <!-- Present -->
      <div class="card present" data-title="The Present">
        <img src="https://i.imgur.com/LoveFront.png" alt="The Lovers">
        <p>A choice between duality: law and intuition.</p>
      </div>
      <!-- Future -->
      <div class="card future" data-title="The Future">
        <img src="https://i.imgur.com/TheMoonFront.png" alt="The Moon">
        <p>Whispers of the unknown — tread with courage.</p>
      </div>
    </div>
  </div>
</body>
</html>
